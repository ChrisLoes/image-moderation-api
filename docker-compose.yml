version: '3.8'

services:
  api:
    build: .
    container_name: mediapipe-nsfw-api
    ports:
      - "8000:8000"
    environment:
      - API_KEYS=test-key-1,test-key-2
      - LOG_LEVEL=info
      - FACE_BLUR_STRENGTH=25
      - NSFW_THRESHOLD=0.6
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
