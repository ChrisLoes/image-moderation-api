name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/image-moderation-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "⚠️  Docker Hub credentials not configured"
            echo "To enable Docker Hub push, configure these secrets:"
            echo "  - DOCKERHUB_USERNAME"
            echo "  - DOCKERHUB_TOKEN"
            echo ""
            echo "See: Settings → Secrets and variables → Actions"
          else
            echo "✅ Docker Hub credentials configured"
            echo "Image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/image-moderation-api"
          fi
          echo ""
          echo "Build status: SUCCESS"
          echo "Docker image built successfully (local build)"
