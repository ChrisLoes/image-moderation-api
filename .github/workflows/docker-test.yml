name: Test Docker Image Build

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mediapipe-nsfw-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image tests
        run: |
          # Start container
          docker run -d \
            --name test-container \
            -p 8000:8000 \
            -e API_KEYS=test-key \
            -e LOG_LEVEL=info \
            --health-cmd='python -c "import requests; requests.get(\"http://localhost:8000/health\")"' \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            mediapipe-nsfw-api:test

          # Wait for container to be healthy
          max_attempts=30
          attempt=0
          while [ "$(docker inspect -f '{{.State.Health.Status}}' test-container)" != "healthy" ] && [ $attempt -lt $max_attempts ]; do
            echo "Waiting for container to be healthy... ($attempt/$max_attempts)"
            sleep 2
            attempt=$((attempt + 1))
          done

          # Check if container is healthy
          if [ "$(docker inspect -f '{{.State.Health.Status}}' test-container)" != "healthy" ]; then
            echo "❌ Container failed health check!"
            docker logs test-container
            exit 1
          fi

          echo "✅ Container is healthy!"

      - name: Test API endpoints
        run: |
          echo "Testing /health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$response" = "200" ]; then
            echo "✅ /health returns 200"
          else
            echo "❌ /health returns $response"
            exit 1
          fi

          echo ""
          echo "Testing /docs endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/docs)
          if [ "$response" = "200" ]; then
            echo "✅ /docs is available"
          else
            echo "❌ /docs returns $response"
            exit 1
          fi

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mediapipe-nsfw-api:test
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Display security scan results
        run: |
          echo "Security scan completed. Check GitHub Security tab for details."

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

      - name: Test Summary
        if: success()
        run: |
          echo "✅ All tests passed!"
          echo "- Docker image builds successfully"
          echo "- Container starts and is healthy"
          echo "- API endpoints respond correctly"
          echo "- No critical security vulnerabilities found"
