name: 🔬 E2E Tests (API + Docker)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx
          pip install -r requirements.txt

      - name: Run E2E tests with pytest
        run: |
          pytest tests/test_e2e_blur.py tests/test_e2e_nsfw.py -v --tb=short --timeout=60 --maxfail=3
        env:
          API_BASE_URL: http://localhost:8000
          API_KEY: test-key
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.python-version }}
          path: |
            test_results.json
            test_blur_*.png
            test_padding_*.png

      - name: Test Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ E2E tests passed"
          else
            echo "⚠️ E2E tests completed with warnings"
          fi

  e2e-tests-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: e2e-test-image:latest

      - name: Start API container
        run: |
          docker run -d \
            --name api-container \
            -p 8000:8000 \
            e2e-test-image:latest

          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ API is ready"
              break
            fi
            echo "Attempt $i/30: Waiting for API..."
            sleep 2
          done

      - name: Set up Python for tests
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx requests

      - name: Run E2E tests against Docker container
        run: |
          pytest tests/test_e2e_blur.py tests/test_e2e_nsfw.py -v --tb=short --timeout=60
        env:
          API_BASE_URL: http://localhost:8000
          API_KEY: test-key

      - name: Collect container logs
        if: failure()
        run: |
          echo "=== Container Logs ==="
          docker logs api-container || true
          echo ""
          echo "=== Container Status ==="
          docker ps -a || true

      - name: Cleanup container
        if: always()
        run: |
          docker stop api-container || true
          docker rm api-container || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-test-results
          path: |
            test_results.json
            test_blur_*.png
            test_padding_*.png
        continue-on-error: true

      - name: Test Summary
        if: always()
        run: |
          echo "## E2E Docker Tests Summary" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ E2E Docker tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E Docker tests failed" >> $GITHUB_STEP_SUMMARY
          fi
