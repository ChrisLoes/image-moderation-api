name: E2E Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Run E2E tests with pytest
        run: |
          pytest tests/test_e2e_blur.py tests/test_e2e_nsfw.py -v --tb=short --timeout=60 --maxfail=3
        env:
          API_BASE_URL: http://localhost:8000
          API_KEY: test-key
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.python-version }}
          path: |
            test_results.json
            test_blur_*.png
            test_padding_*.png

      - name: Test Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ E2E tests passed"
          else
            echo "⚠️ E2E tests completed with warnings"
          fi

  e2e-tests-docker:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update
          apt-get install -y python3.12 python3.12-venv python3-pip
          python3.12 -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Start API
        run: |
          python3.12 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl http://localhost:8000/docs || true
        continue-on-error: true

      - name: Run E2E tests
        run: |
          pytest tests/test_e2e_blur.py tests/test_e2e_nsfw.py -v --tb=short --timeout=60
        env:
          API_BASE_URL: http://localhost:8000
          API_KEY: test-key
        continue-on-error: true

      - name: Test Results
        if: always()
        run: |
          echo "E2E tests completed"
          [ -f test_results.json ] && cat test_results.json || echo "No results file"
