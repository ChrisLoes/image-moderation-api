name: AI Agent Diagnostics

on:
  workflow_dispatch:
    inputs:
      analysis_type:
        description: Type of analysis
        type: choice
        options:
          - full
          - quick

permissions:
  contents: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    if: secrets.ANTHROPIC_API_KEY != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run AI diagnostics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'SCRIPT'
          from anthropic import Anthropic
          from pathlib import Path

          client = Anthropic()

          # Read project files
          files_content = {}
          for file in ['requirements.txt', 'Dockerfile', 'README.md']:
              if Path(file).exists():
                  with open(file) as f:
                      files_content[file] = f.read()[:1000]

          prompt = f"""Analyze this project structure and suggest improvements:

          {str(files_content)}

          Focus on:
          1. Dependency compatibility
          2. Docker optimization
          3. Performance issues
          4. Security concerns
          """

          response = client.messages.create(
              model="claude-opus-4-1",
              max_tokens=1024,
              messages=[{"role": "user", "content": prompt}]
          )

          print(response.content[0].text)
          SCRIPT

  no-api-key:
    runs-on: ubuntu-latest
    if: secrets.ANTHROPIC_API_KEY == ''
    steps:
      - name: Note
        run: |
          echo "⚠️ AI Agent requires ANTHROPIC_API_KEY secret"
          echo "Set it in Settings → Secrets and variables → Actions"
