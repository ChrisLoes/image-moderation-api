name: Auto-Fix Build Issues

on:
  workflow_dispatch:
    inputs:
      issue_type:
        description: Type of issue to fix
        type: choice
        options:
          - dependencies
          - dockerfile
          - all

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix dependencies
        if: github.event.inputs.issue_type == 'dependencies' || github.event.inputs.issue_type == 'all'
        run: |
          echo "🔧 Checking requirements.txt for issues..."
          pip install pipdeptree
          pipdeptree || true

      - name: Check Dockerfile
        if: github.event.inputs.issue_type == 'dockerfile' || github.event.inputs.issue_type == 'all'
        run: |
          echo "🔍 Validating Dockerfile..."
          if command -v hadolint &> /dev/null; then
            hadolint Dockerfile
          else
            echo "hadolint not available, skipping lint"
          fi

      - name: Create summary
        run: |
          echo "✅ Fix check completed"
          echo "Review logs above for any issues"
